<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- 🚀 Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- 🚀 Optimized Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>K2R3 Restaurant | Pure Veg • R3 Café • A²CM Chettinad Mess</title>

  <meta name="description"
    content="K2R3 Restaurant offers premium vegetarian cuisine, R3 Café beverages, and authentic Chettinad dishes in Thanakkankulam, Tamil Nadu." />

  <meta name="keywords"
    content="K2R3, Veg Restaurant Madurai, Chettinad Mess, R3 Cafe, Thanakkankulam Restaurant, Tamil Nadu Food" />

  <meta name="author" content="K2R3 Restaurant" />

  <!-- Open Graph -->
  <meta property="og:title" content="K2R3 Premium Restaurant" />
  <meta property="og:description"
    content="Experience authentic vegetarian and Chettinad cuisine at K2R3." />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:type" content="website" />

  <!-- Location SEO -->
  <meta name="geo.region" content="IN-TN" />
  <meta name="geo.placename" content="Thanakkankulam, Tamil Nadu" />

  <!-- 🎨 Animation CSS -->
  <style>
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeUp {
      animation: fadeUp 0.8s ease forwards;
    }

    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-500 { animation-delay: 0.5s; }
  </style>

</head>

<body class="dark">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
